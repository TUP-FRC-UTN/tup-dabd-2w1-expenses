<!--LLamada al componente navbar de la libreria core del profe-->
<app-navbar [menuItems]="items" (menuVisited)="onMenuVisited($event)" />
<router-outlet></router-outlet>
<!--casos dependiendo de lo seleccionado en el navbar-->
<div>
    @switch (visibleSection) {
    @case ('menu1') {
    <p>Mostrar el componente de Lista de Gastos como Administrador</p>
    }
    @case ('menu2') {
        <p>Mostrar el componente de Lista de Gastos como Propietario</p>
    }
    @case ('menu3') {
        <app-expenses-register-expense></app-expenses-register-expense>
    }
    @default {
    <h2>HOME</h2>
    }
    }
</div>
